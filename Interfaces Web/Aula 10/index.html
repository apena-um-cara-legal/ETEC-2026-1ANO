<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aula 10: O Espaço Entre Nós</title>
    <style>   
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .container{
            background-color: #f0f0f0;
            padding: 20px;
            border: 2px solid #ccc;
        }

        .caixa-central{
            width: 50%; /* Obrigatório ter largura para centralizar */
            background-color: #8e44ad; /* Roxo */
            color: white;
            padding: 20px;
            text-align: center;

            /* Centralização: 50px em cima/baixo e AUTO nas laterais */
            margin: 50px auto;
        }

        .bloco-vizinho1{
            background-color: #e67e22; /* laranja */
            padding: 15px;

            /* margens individuais para testar o colapso */
            margin-bottom: 100px;
            margin-top: 30px;
        }

         .bloco-vizinho2{
            background-color: #e67e22; /* laranja */
            padding: 15px;

            /* margens individuais para testar o colapso */
            margin-bottom: 30px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <!-- Este bloco vai testar o colapso de margem com o proximo -->
         <div class="bloco-vizinho1">
            Bloco vizinho 1 (Margem Inferior: 30px)
         </div>

         <!-- Entre estes dois, o espaço será de apenas 30px, não 60px -->
          <div class="bloco-vizinho2">
            Bloco vizinho 2 (Margem Superior: 30px)
          </div>

          <!-- Esta caixa ficará perfeitamente no meio do container -->
           <div class="caixa-central">
            Eu estou centralizado com 'margin: auto'!
           </div>
    </div>
</body>
</html>
