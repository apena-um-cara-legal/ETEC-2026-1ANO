<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aula 11</title>
    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eceff4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card{
            width: 300px;
            height: 180px;
            background: linear-gradient(120deg, #ff9a9e, #fad0c4);
            border-radius: 12px;
            color: #fff;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            margin: 10px;
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Card de Gradiente</h2>
        <p>Mostra background e opacidade.</p>
    </div>
