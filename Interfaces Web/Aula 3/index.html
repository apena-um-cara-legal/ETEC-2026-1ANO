<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aula 3 - Revista Digital</title>
</head>
<body>

    <!-- Cabeçalho Principal (Topo do site) -->
     <header>
        <h1>Portal Tech 2026</h1>
        <p>Informação com sentido e som.</p>
     </header>

     <nav>

       <ul>
        <li><a href="#Audio">Veja o Audio</a></li>
        <li><a href="#Video">Veja o Vídeo</a></li>

       </ul>
     </nav>
    
     <!-- Área principal de Conteúdo -->
      <main>

        <!-- Article: Conteúdo que faz sentido independentemente do site -->
        <article>
            <h2>A Revolução don HTML5</h2>

            <!-- Secção de Introdução -->
            <section id="Audio">
                <p>O HTML5 mudou a forma como consumimos mídia na Web.</p>

                <!-- Iserindo Áudio: 'controls' é essencial para o utilizador -->
                 <audio controls loop>
                    <source src="CG5 - Locked Away (from Dandy's World) - CG5 (youtube).mp3" type="audio/mpeg">
                    Seu browser não suporta áudio.
                 </audio>
             </section>
            
             <!-- Secção de demonstração visual -->
             <section id="Video">
                <h3>Veja o vídeo explicativo:</h3>

                <!-- Vídeo: 'poster' é a imagem exibida antes do play -->
                 <video width="640" controls poster="capa.jpg">
                    <source src="YTDown.com_Shorts_O-que-acontece-se-voce-fizer-30-flexoes-_Media_pRWq-RJbfjQ_001_1080p (1).mp4" type="video/mp4"> 
                    Vídeo não suportado.
                 </video>
             </section>
        </article>

        <!-- Aside: Conteúdo lateral relacionado ao artigo principal -->
         <aside>
            <h4>Glossário Rápido</h4>
            <p>MP4: O formato de vídeo mais popular da web.</p>
         </aside>

      </main>

      <!-- Rodapé: Créditos e avisos -->
       <footer>
        <p><small>Documanto criado para fins educativos.</small></p>
       </footer>
       
</body>
</html>
